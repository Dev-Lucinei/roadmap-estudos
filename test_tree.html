<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Árvore Expansível</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-color: #4a9eff;
            --text-color: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            padding: 50px;
        }

        .node-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px;
        }

        .node {
            padding: 15px 45px 15px 25px;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 180px;
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .node.has-children {
            border-color: var(--accent-color);
            background: rgba(74, 158, 255, 0.08);
        }

        .node.has-children:hover {
            background: rgba(74, 158, 255, 0.15);
            transform: scale(1.02);
        }

        .node-expand-icon {
            position: absolute;
            right: 15px;
            font-size: 1.2rem;
            color: var(--accent-color);
            transition: transform 0.3s ease;
            font-weight: bold;
        }

        .node.expanded .node-expand-icon {
            transform: rotate(90deg);
        }

        .node-subtopics-tree {
            max-height: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 0;
            padding-left: 40px;
            position: relative;
            opacity: 0;
            transition: max-height 0.5s ease, opacity 0.4s ease, margin-top 0.3s ease;
        }

        .node-wrapper.expanded .node-subtopics-tree {
            max-height: 1000px;
            opacity: 1;
            margin-top: 20px;
        }

        .node-wrapper.expanded .node-subtopics-tree::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, var(--accent-color), transparent);
        }

        .subtopic-wrapper {
            position: relative;
            padding-left: 30px;
        }

        .subtopic-wrapper::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 20px;
            height: 2px;
            background: var(--glass-border);
        }

        .subtopic-item {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-width: 200px;
        }

        .subtopic-item:hover {
            background: rgba(74, 158, 255, 0.15);
            border-color: var(--accent-color);
            transform: translateX(8px);
        }

        .subtopic-arrow {
            color: var(--accent-color);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .subtopic-item:hover .subtopic-arrow {
            opacity: 1;
        }
    </style>
</head>
<body>
    <h1>Teste de Árvore Expansível</h1>
    
    <div class="node-wrapper" id="wrapper-docker">
        <div class="node has-children" id="node-docker" onclick="toggleTree('docker')">
            <span class="node-title">Docker</span>
            <span class="node-expand-icon">›</span>
        </div>
        
        <div class="node-subtopics-tree" id="subtopics-docker">
            <div class="subtopic-wrapper">
                <div class="subtopic-item">
                    <span>Introdução ao Docker</span>
                    <span class="subtopic-arrow">›</span>
                </div>
            </div>
            <div class="subtopic-wrapper">
                <div class="subtopic-item">
                    <span>Containers vs VMs</span>
                    <span class="subtopic-arrow">›</span>
                </div>
            </div>
            <div class="subtopic-wrapper">
                <div class="subtopic-item">
                    <span>Imagens Docker</span>
                    <span class="subtopic-arrow">›</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleTree(id) {
            const wrapper = document.getElementById(`wrapper-${id}`);
            const node = document.getElementById(`node-${id}`);
            
            console.log('Toggling:', id);
            console.log('Wrapper:', wrapper);
            console.log('Has expanded class:', wrapper.classList.contains('expanded'));
            
            if (wrapper.classList.contains('expanded')) {
                wrapper.classList.remove('expanded');
                node.classList.remove('expanded');
            } else {
                wrapper.classList.add('expanded');
                node.classList.add('expanded');
            }
        }
    </script>
</body>
</html>
