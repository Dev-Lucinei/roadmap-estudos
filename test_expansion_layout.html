<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste - Layout de Expansão Inteligente</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            padding: 40px;
            background: var(--bg-gradient);
        }
        .test-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .test-title {
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 40px;
            font-size: 2rem;
        }
        .legend {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            color: var(--text-primary);
        }
        .legend h3 {
            margin-top: 0;
            color: var(--accent-color);
        }
        .legend ul {
            margin: 10px 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1 class="test-title">🎯 Teste de Expansão Inteligente</h1>
        
        <div class="legend">
            <h3>Como funciona:</h3>
            <ul>
                <li><strong>Nível 0 (Central):</strong> Nó principal</li>
                <li><strong>Nível 1:</strong> Expande HORIZONTALMENTE (esquerda/direita)</li>
                <li><strong>Nível 2+:</strong> Expande VERTICALMENTE (cima/baixo)</li>
            </ul>
            <p>Clique nos nós com ▶ para expandir e ver a hierarquia.</p>
        </div>

        <div id="nodes-container" class="nodes-container"></div>
    </div>

    <script>
        // Dados de teste com múltiplos níveis
        const testData = {
            id: "docker",
            title: "Docker",
            type: "central",
            difficulty: "medium",
            subtopics: [
                {
                    id: "docker-conceitos",
                    title: "Conceitos Básicos",
                    difficulty: "easy",
                    subtopics: [
                        { id: "docker-containers", title: "Containers vs VMs" },
                        { id: "docker-images", title: "Imagens Docker" },
                        { id: "docker-registry", title: "Docker Registry" }
                    ]
                },
                {
                    id: "docker-uso",
                    title: "Uso Básico",
                    difficulty: "easy",
                    subtopics: [
                        { id: "docker-run", title: "docker run" },
                        { id: "docker-build", title: "docker build" }
                    ]
                },
                {
                    id: "docker-avancado",
                    title: "Recursos Avançados",
                    difficulty: "hard",
                    subtopics: [
                        { 
                            id: "docker-dockerfiles", 
                            title: "Dockerfiles",
                            subtopics: [
                                { id: "docker-multi-stage", title: "Multi-stage builds" },
                                { id: "docker-best-practices", title: "Best Practices" }
                            ]
                        },
                        { id: "docker-compose", title: "Docker Compose" },
                        { id: "docker-networks", title: "Redes Docker" }
                    ]
                },
                {
                    id: "docker-praticas",
                    title: "Melhores Práticas",
                    difficulty: "medium"
                }
            ]
        };

        function createNodeElement(node, level = 0) {
            const hasSubtopics = node.subtopics && node.subtopics.length > 0;
            
            const wrapper = document.createElement('div');
            wrapper.className = 'node-wrapper';
            wrapper.id = `wrapper-${node.id}`;
            wrapper.setAttribute('data-level', level);
            
            const el = document.createElement('div');
            el.className = `node ${node.type || 'subtopic'} difficulty-${node.difficulty || 'medium'}`;
            el.id = `node-${node.id}`;
            
            if (hasSubtopics) {
                el.classList.add('has-subtopics');
                el.onclick = () => toggleSubtopics(node.id);
            }
            
            const title = document.createElement('div');
            title.className = 'node-title';
            title.textContent = node.title;
            el.appendChild(title);
            
            if (hasSubtopics) {
                const icon = document.createElement('span');
                icon.className = 'node-expand-icon';
                icon.textContent = '▶';
                el.appendChild(icon);
            }
            
            const badge = document.createElement('span');
            badge.className = 'node-badge';
            badge.textContent = `Nível ${level}`;
            el.appendChild(badge);
            
            wrapper.appendChild(el);
            
            if (hasSubtopics) {
                const subtopicsContainer = document.createElement('div');
                subtopicsContainer.className = 'node-subtopics-tree';
                subtopicsContainer.id = `subtopics-${node.id}`;
                
                node.subtopics.forEach((subtopic) => {
                    const subtopicNode = {
                        id: subtopic.id || `${node.id}_${subtopic.title}`,
                        title: subtopic.title || subtopic,
                        subtopics: subtopic.subtopics || [],
                        type: 'subtopic',
                        difficulty: subtopic.difficulty || node.difficulty
                    };
                    
                    const subtopicWrapper = createNodeElement(subtopicNode, level + 1);
                    subtopicsContainer.appendChild(subtopicWrapper);
                });
                
                wrapper.appendChild(subtopicsContainer);
            }
            
            return wrapper;
        }

        function toggleSubtopics(nodeId) {
            const wrapper = document.getElementById(`wrapper-${nodeId}`);
            const nodeEl = document.getElementById(`node-${nodeId}`);
            
            if (!wrapper || !nodeEl) return;
            
            const isExpanded = wrapper.classList.contains('expanded');
            
            if (isExpanded) {
                wrapper.classList.remove('expanded');
                nodeEl.classList.remove('expanded');
            } else {
                wrapper.classList.add('expanded');
                nodeEl.classList.add('expanded');
            }
        }

        // Renderizar
        const container = document.getElementById('nodes-container');
        container.appendChild(createNodeElement(testData, 0));
    </script>
</body>
</html>
