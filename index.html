<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Learning Path - Engenharia & Fullstack</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="flowchart_layout.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
</head>
<body>
    <div class="progress-container">
        <div id="progress-fill"></div>
        <span id="progress-percent">0%</span>
    </div>

    <div id="streak-counter" class="streak-badge">
        🔥 <span id="streak-days">0</span> dias
    </div>

    <div id="app-container">
        <main id="roadmap-view">
            <svg id="roadmap-svg"></svg>
            
            <header class="roadmap-header">
                <div class="header-controls">
                    <select id="roadmap-selector" onchange="loadRoadmap(this.value)">
                        <option value="">Carregando temas...</option>
                    </select>
                    <button class="admin-btn" onclick="expandAllNodes()" title="Expandir todos os nós">📂 Expandir</button>
                    <button class="admin-btn" onclick="collapseAllNodes()" title="Recolher todos os nós">📁 Recolher</button>
                    <button class="admin-btn" onclick="openNewRoadmapModal()">+ Novo Tema</button>
                    <button id="edit-mode-btn" class="admin-btn" onclick="toggleEditMode()">✏️ Modo Edição</button>
                </div>
                <h1>Meu Roteiro de Engenharia</h1>
                <p>Navegue pelos temas ou crie novos roteiros com IA.</p>
            </header>
            
            <div id="roadmap-nodes">
                <!-- Nodes renderizados via JS -->
            </div>
            
            <!-- Container para layout de fluxograma -->
            <div id="flowchart-container" class="flowchart-container" style="display: none;">
                <svg class="flowchart-svg" id="flowchart-svg"></svg>
            </div>
        </main>

        <aside id="lesson-panel">
            <div class="panel-header">
                <div class="panel-tools">
                    <button class="zen-btn" onclick="toggleZenMode()" title="Modo Zen">🧘</button>
                    <button id="gen-quiz-btn" class="admin-btn" onclick="generateLessonForCurrentNode()" style="display:none">🤖 Gerar Lição/Quiz</button>
                </div>
                <button class="close-btn" onclick="closePanel()">×</button>
            </div>
            <div id="lesson-scroll-container" class="lesson-scroll-container">
                <div id="lesson-content" class="lesson-content">
                    <!-- Conteúdo da lição -->
                </div>
                <div id="quiz-container" class="quiz-container" style="display: none;">
                    <!-- Quiz renderizado via JS -->
                </div>
            </div>
        </aside>
    </div>

    <!-- Modais -->
    <div id="modal-overlay" class="modal-overlay" style="display:none">
        <div class="modal-content glass">
            <h3>Gerar Novo Roadmap</h3>
            <p>Digite o tema que deseja estudar (ex: "DevOps", "React", "Cybersecurity"):</p>
            <input type="text" id="new-roadmap-theme" placeholder="Tema do roadmap...">
            <div class="modal-actions">
                <button class="admin-btn cancel" onclick="closeModal()">Cancelar</button>
                <button class="admin-btn" onclick="submitGenerateRoadmap()">Gerar com IA</button>
            </div>
        </div>
    </div>

    <!-- Scripts do App -->
    <script src="flowchart_layout.js"></script>
    <script src="app.js"></script>
</body>
</html>
